name: Fetch Tracker Log

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tracker log
        run: |
          curl -s -f \
            -H "Cookie: ${{ secrets.AP_SESSION_COOKIE }}" \
            "${{ secrets.AP_TRACKER_URL }}" \
            -o src/default-tracker.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/default-tracker.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Write fetch timestamp
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "{\"fetchedAt\":\"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > src/tracker-meta.json

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/default-tracker.txt src/tracker-meta.json
          git commit -m "chore: update tracker log $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
